<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Træning</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --accent: #d4f060;
    --accent2: #60d4f0;
    --text: #f0f0f0;
    --muted: #555;
    --muted2: #888;
    --red: #ff5555;
    --green: #55ff99;
    --gold: #ffd700;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: 'Syne', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

  .header { padding: 56px 20px 16px; display: flex; justify-content: space-between; align-items: flex-start; }
  .app-title { font-size: 26px; font-weight: 800; letter-spacing: -1px; }
  .app-title span { color: var(--accent); }
  .header-right { display: flex; gap: 8px; align-items: center; }
  .refresh-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 8px 12px; color: var(--muted2); font-size: 11px; font-family: 'Syne', sans-serif; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .settings-btn { background: var(--surface); border: 1px solid var(--border); border-radius: 50%; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; flex-shrink: 0; }

  .deload-bar { padding: 0 20px 16px; }
  .deload-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
  .deload-card.active { background: linear-gradient(135deg, #1a0a0a, #2a1a0a); border-color: #ff8c00; }
  .deload-info { flex: 1; }
  .deload-title { font-size: 13px; font-weight: 800; color: var(--text); }
  .deload-title.active { color: #ff8c00; }
  .deload-sub { font-size: 11px; color: var(--muted2); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .deload-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 8px 14px; font-size: 12px; font-weight: 700; font-family: 'Syne', sans-serif; color: var(--text); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .deload-btn.active { background: #ff8c00; border-color: #ff8c00; color: #000; }

  .tabs { display: flex; gap: 6px; padding: 0 20px 20px; overflow-x: auto; scrollbar-width: none; }
  .tabs::-webkit-scrollbar { display: none; }
  .tab { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 8px 14px; font-size: 12px; font-weight: 700; color: var(--muted2); cursor: pointer; white-space: nowrap; flex-shrink: 0; transition: all 0.15s; }
  .tab.active { background: var(--accent); color: var(--bg); border-color: var(--accent); }

  .section { padding: 0 20px 24px; }
  .section-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; color: var(--muted); margin-bottom: 10px; }

  .latest-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; }
  .latest-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 18px 12px; border-bottom: 1px solid var(--border); }
  .latest-date { font-size: 15px; font-weight: 700; }
  .latest-meta { font-size: 11px; color: var(--muted2); font-family: 'DM Mono', monospace; margin-top: 2px; }
  .cals-badge { background: var(--accent); color: var(--bg); border-radius: 20px; padding: 5px 11px; font-size: 11px; font-weight: 700; font-family: 'DM Mono', monospace; white-space: nowrap; }

  .exercise-block { padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .exercise-block:last-child { border-bottom: none; }
  .exercise-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .exercise-name { font-size: 14px; font-weight: 700; flex: 1; padding-right: 8px; }
  .exercise-badges { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }
  .trend-up { color: var(--green); font-size: 13px; font-weight: 700; }
  .trend-down { color: var(--red); font-size: 13px; font-weight: 700; }
  .trend-same { color: var(--muted2); font-size: 13px; }

  .sets-grid { display: flex; flex-direction: column; gap: 4px; }
  .set-row { display: grid; grid-template-columns: 44px 1fr 1fr; gap: 6px; align-items: center; }
  .set-num { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .set-kg { background: var(--surface2); border-radius: 8px; padding: 6px 10px; font-size: 13px; font-weight: 600; color: var(--accent); font-family: 'DM Mono', monospace; text-align: center; }
  .set-reps { background: var(--surface2); border-radius: 8px; padding: 6px 10px; font-size: 13px; color: var(--muted2); font-family: 'DM Mono', monospace; text-align: center; }
  .set-note { grid-column: 1 / -1; font-size: 11px; color: var(--muted2); font-style: italic; padding: 2px 4px; }

  .cardio-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; margin-top: 4px; }
  .cardio-stat { background: var(--surface2); border-radius: 8px; padding: 8px; text-align: center; }
  .cardio-val { font-size: 14px; font-weight: 700; color: var(--accent2); font-family: 'DM Mono', monospace; }
  .cardio-label { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .cardio-note { font-size: 11px; color: var(--muted2); font-style: italic; margin-top: 8px; padding: 0 2px; }

  /* Færdig knap */
  .done-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: calc(100% - 36px);
    margin: 0 18px 18px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }
  .done-btn:active { opacity: 0.7; }
  .done-btn.loading { color: var(--muted2); }

  /* Debrief card */
  .debrief-card {
    background: linear-gradient(135deg, #1a2a0a, #0a1a2a);
    border: 1px solid #3a5a1a;
    border-radius: 20px;
    overflow: hidden;
    margin: 0 20px 24px;
  }
  .debrief-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 18px 12px;
    border-bottom: 1px solid #2a4a1a;
  }
  .debrief-title { font-size: 14px; font-weight: 800; color: var(--accent); }
  .debrief-subtitle { font-size: 11px; color: #6a8a4a; margin-top: 2px; }
  .debrief-body { padding: 16px 18px; font-size: 13px; line-height: 1.7; color: #c0d0a0; }
  .next-exercise-block { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
  .next-exercise-block:last-child { margin-bottom: 0; }
  .next-exercise-name { font-size: 13px; font-weight: 800; color: var(--accent2); margin-bottom: 6px; }
  .next-exercise-detail { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
  .next-badge { background: rgba(96,212,240,0.12); border-radius: 8px; padding: 3px 9px; font-size: 11px; font-family: 'DM Mono', monospace; color: var(--accent2); }
  .next-badge.up { background: rgba(85,255,153,0.12); color: var(--green); }
  .next-badge.down { background: rgba(255,85,85,0.12); color: var(--red); }
  .next-badge.same { background: rgba(255,255,255,0.06); color: var(--muted2); }
  .next-reason { font-size: 11px; color: #6a9aaa; line-height: 1.5; }
  .set-plan-grid { display: flex; flex-direction: column; gap: 4px; margin: 8px 0 6px; }
  .set-plan-row { display: grid; grid-template-columns: 44px 1fr 1fr; gap: 6px; align-items: center; }
  .set-plan-num { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }
  .set-plan-kg { background: var(--surface2); border-radius: 8px; padding: 5px 10px; font-size: 13px; font-weight: 700; color: var(--accent2); font-family: 'DM Mono', monospace; text-align: center; }
  .set-plan-reps { background: var(--surface2); border-radius: 8px; padding: 5px 10px; font-size: 12px; color: var(--muted2); font-family: 'DM Mono', monospace; text-align: center; }
  .debrief-powered { font-size: 10px; color: #4a6a3a; padding: 0 18px 14px; font-family: 'DM Mono', monospace; }

  /* Next plan card */
  .next-card {
    background: linear-gradient(135deg, #0a1a2a, #1a0a2a);
    border: 1px solid #1a3a5a;
    border-radius: 20px;
    overflow: hidden;
    margin: 0 20px 24px;
  }
  .next-header { padding: 16px 18px 12px; border-bottom: 1px solid #1a3a5a; }
  .next-title { font-size: 14px; font-weight: 800; color: var(--accent2); }
  .next-subtitle { font-size: 11px; color: #4a7a9a; margin-top: 2px; }
  .next-body { padding: 16px 18px; font-size: 13px; line-height: 1.7; color: #a0c0d0; }

  .history-item { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 8px; overflow: hidden; }
  .history-header { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; cursor: pointer; }
  .history-header:active { background: var(--surface2); }
  .history-date { font-size: 14px; font-weight: 700; }
  .history-info { font-size: 11px; color: var(--muted2); margin-top: 2px; font-family: 'DM Mono', monospace; }
  .chevron { color: var(--muted); font-size: 14px; transition: transform 0.2s; flex-shrink: 0; }
  .history-item.open .chevron { transform: rotate(180deg); }
  .history-body { display: none; border-top: 1px solid var(--border); }
  .history-item.open .history-body { display: block; }

  .settings-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; padding: 20px; overflow-y: auto; }
  .settings-panel.open { display: block; }
  .settings-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 24px; width: 100%; max-width: 600px; margin: 0 auto 40px; }
  .settings-title { font-size: 18px; font-weight: 800; margin-bottom: 6px; }
  .settings-subtitle { font-size: 12px; color: var(--muted2); margin-bottom: 20px; line-height: 1.4; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 11px; color: var(--muted2); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .field input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 14px; font-family: 'DM Mono', monospace; }
  .field input:focus { outline: none; border-color: var(--accent); }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .divider { height: 1px; background: var(--border); margin: 18px 0; }
  .btn-p { width: 100%; background: var(--accent); color: var(--bg); border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 800; font-family: 'Syne', sans-serif; cursor: pointer; margin-bottom: 10px; }
  .btn-s { width: 100%; background: transparent; color: var(--muted2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; font-size: 14px; font-family: 'Syne', sans-serif; cursor: pointer; }

  .est-note { font-size: 10px; color: var(--muted); text-align: center; padding: 4px 18px 14px; font-family: 'DM Mono', monospace; }
  .state-msg { text-align: center; padding: 60px 20px; color: var(--muted2); font-size: 14px; line-height: 1.8; }
  .error-card { background: #1a0a0a; border: 1px solid #3a1a1a; border-radius: 16px; padding: 16px; margin: 0 20px; color: var(--red); font-size: 13px; line-height: 1.5; }
  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--muted); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .fade-in { animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .empty-split { text-align: center; padding: 40px 20px; color: var(--muted2); font-size: 13px; line-height: 1.8; }
  .pr-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; margin-bottom: 8px; overflow: hidden; }
  .pr-row { display: grid; grid-template-columns: 1fr auto; align-items: center; padding: 12px 16px; border-bottom: 1px solid var(--border); }
  .pr-row:last-child { border-bottom: none; }
  .pr-name { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
  .pr-date { font-size: 10px; color: var(--muted2); font-family: 'DM Mono', monospace; }
  .pr-right { text-align: right; }
  .pr-kg { font-size: 16px; font-weight: 800; color: var(--accent); font-family: 'DM Mono', monospace; }
  .pr-reps { font-size: 10px; color: var(--muted2); font-family: 'DM Mono', monospace; margin-top: 2px; }
</style>
</head>
<body>

<div class="header">
  <div class="app-title">TRÆNING<span>.</span></div>
  <div class="header-right">
    <button class="refresh-btn" onclick="refreshData()"><div class="dot"></div>Opdater</button>
    <div class="settings-btn" onclick="openSettings()">⚙️</div>
  </div>
</div>

<div class="deload-bar" id="deloadBar" style="display:none">
  <div class="deload-card" id="deloadCard">
    <div class="deload-info">
      <div class="deload-title" id="deloadTitle">Deload uge</div>
      <div class="deload-sub" id="deloadSub">—</div>
    </div>
    <button class="deload-btn" id="deloadBtn" onclick="toggleDeload()">Aktiver</button>
  </div>
</div>

<div class="tabs" id="tabs" style="display:none">
  <div class="tab active" onclick="switchTab('overview')">Oversigt</div>
  <div class="tab" onclick="switchTab('bryst-skulder')">Bryst/Skulder</div>
  <div class="tab" onclick="switchTab('ryg-arme')">Ryg/Arme</div>
  <div class="tab" onclick="switchTab('ben')">Ben</div>
  <div class="tab" onclick="switchTab('cardio')">Cardio</div>
  <div class="tab" onclick="switchTab('prs')">🏆 PR's</div>
</div>

<div id="debriefSection"></div>
<div id="mainContent"></div>

<div class="settings-panel" id="settingsPanel" onclick="if(event.target===this)closeSettings()">
  <div class="settings-card">
    <div class="settings-title">Indstillinger</div>
    <div class="settings-subtitle">Brugerdata giver mere præcise kalorieestimater via Harris-Benedict formlen</div>
    <div class="field">
      <label>Google Sheets CSV-link</label>
      <input type="url" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/.../export?format=csv">
    </div>
    <div class="field">
      <label>Groq API nøgle</label>
      <input type="text" id="geminiKey" placeholder="gsk_...">
    </div>
    <div class="divider"></div>
    <div class="field-row">
      <div class="field"><label>Vægt (kg)</label><input type="number" id="bodyWeight" placeholder="95"></div>
      <div class="field"><label>Højde (cm)</label><input type="number" id="bodyHeight" placeholder="180"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Alder</label><input type="number" id="bodyAge" placeholder="22"></div>
      <div class="field"><label>Køn</label><input type="text" id="bodySex" placeholder="mand / kvinde"></div>
    </div>
    <button class="btn-p" onclick="saveSettings()">Gem og hent data</button>
    <div class="divider"></div>
    <div style="font-size:11px;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Træningsprogram</div>
    <div style="font-size:11px;color:var(--muted2);margin-bottom:10px;line-height:1.5">Én øvelse per linje. Ændringer gælder næste debrief.</div>
    <div class="field"><label>Bryst/Skulder A (Smith)</label><textarea id="programBSA" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;min-height:100px;resize:vertical"></textarea></div>
    <div class="field"><label>Bryst/Skulder B (Dumbell)</label><textarea id="programBSB" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;min-height:100px;resize:vertical"></textarea></div>
    <div class="field"><label>Ryg/Arme</label><textarea id="programRA" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;min-height:100px;resize:vertical"></textarea></div>
    <div class="field"><label>Ben A (Hack Squat)</label><textarea id="programBenA" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;min-height:80px;resize:vertical"></textarea></div>
    <div class="field"><label>Ben B (RDL)</label><textarea id="programBenB" style="width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:12px;font-family:'DM Mono',monospace;min-height:80px;resize:vertical"></textarea></div>
    <button class="btn-p" style="margin-bottom:8px" onclick="saveProgram();alert('Program gemt ✅')">Gem program</button>
    <div class="divider"></div>
    <div style="font-size:11px;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Ryd debrief per split</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
      <button class="btn-s" onclick="clearSplitDebrief('bryst-skulder')">Bryst/Skulder</button>
      <button class="btn-s" onclick="clearSplitDebrief('ryg-arme')">Ryg/Arme</button>
      <button class="btn-s" onclick="clearSplitDebrief('ben')">Ben</button>
      <button class="btn-s" onclick="clearSplitDebrief('cardio')">Cardio</button>
    </div>
    <button class="btn-s" onclick="clearDebrief()">Ryd alle debriefs</button>
    <button class="btn-s" style="margin-top:8px" onclick="closeSettings()">Luk</button>
  </div>
</div>

<script>
const SHEET_KEY='traening_sheet_url', WEIGHT_KEY='traening_weight', HEIGHT_KEY='traening_height';
const AGE_KEY='traening_age', SEX_KEY='traening_sex', GEMINI_KEY='traening_gemini_key';
const DEBRIEF_KEY='traening_debrief', NEXT_KEY='traening_next_plan', PROGRAM_KEY='traening_program', DELOAD_KEY='traening_deload';

function getDeloadState() {
  const saved = localStorage.getItem(DELOAD_KEY);
  return saved ? JSON.parse(saved) : { active: false, startDate: null, lastDeload: null };
}

function toggleDeload() {
  const state = getDeloadState();
  if (state.active) {
    // Deaktiver deload
    state.active = false;
    state.lastDeload = state.startDate;
    state.startDate = null;
  } else {
    // Aktiver deload
    state.active = true;
    state.startDate = new Date().toISOString().split('T')[0];
    state.lastDeload = state.startDate;
  }
  localStorage.setItem(DELOAD_KEY, JSON.stringify(state));
  renderDeloadBar();
}

function isDeloadActive() {
  const state = getDeloadState();
  if (!state.active || !state.startDate) return false;
  const start = new Date(state.startDate);
  const now = new Date();
  const daysDiff = Math.floor((now - start) / 86400000);
  if (daysDiff >= 7) {
    // Auto-deaktiver efter 7 dage
    state.active = false;
    state.lastDeload = state.startDate;
    state.startDate = null;
    localStorage.setItem(DELOAD_KEY, JSON.stringify(state));
    return false;
  }
  return true;
}

function renderDeloadBar() {
  const state = getDeloadState();
  const card = document.getElementById('deloadCard');
  const title = document.getElementById('deloadTitle');
  const sub = document.getElementById('deloadSub');
  const btn = document.getElementById('deloadBtn');
  if (!card) return;

  const active = isDeloadActive();

  if (active) {
    const start = new Date(state.startDate);
    const now = new Date();
    const daysIn = Math.floor((now - start) / 86400000) + 1;
    const daysLeft = 7 - daysIn + 1;
    card.classList.add('active');
    title.classList.add('active');
    title.textContent = '🟠 DELOAD UGE AKTIV';
    sub.textContent = `Dag ${daysIn}/7 · ${daysLeft} dag${daysLeft===1?'':'e'} tilbage · 50% vægt`;
    btn.classList.add('active');
    btn.textContent = 'Afslut deload';
  } else {
    card.classList.remove('active');
    title.classList.remove('active');
    title.textContent = 'Deload uge';
    if (state.lastDeload) {
      const last = new Date(state.lastDeload);
      const now = new Date();
      const daysSince = Math.floor((now - last) / 86400000);
      const weeksSince = Math.floor(daysSince / 7);
      sub.textContent = `Sidst: ${daysSince} dag${daysSince===1?'':'e'} siden (${weeksSince} uge${weeksSince===1?'':'r'}) · Anbefales hver 6-8 uge`;
    } else {
      sub.textContent = 'Ingen deload registreret endnu · Anbefales hver 6-8 uge';
    }
    btn.classList.remove('active');
    btn.textContent = 'Aktiver';
  }
}
let bodyWeight=95, bodyHeight=180, bodyAge=22, bodySex='mand';
let currentTab='overview', globalData=[];

const DEFAULT_PROGRAM = {

// A/B split tracking
const AB_KEY = 'traening_ab_state';
function getLastAB(splitBase) {
  const saved = localStorage.getItem(AB_KEY);
  if (!saved) return null;
  return JSON.parse(saved)[splitBase] || null;
}
function setLastAB(splitBase, variant) {
  const saved = localStorage.getItem(AB_KEY);
  const state = saved ? JSON.parse(saved) : {};
  state[splitBase] = variant;
  localStorage.setItem(AB_KEY, JSON.stringify(state));
}
function getNextVariant(splitBase) {
  const last = getLastAB(splitBase);
  if (!last || last === 'b') return 'a';
  return 'b';
}

function getProgram() {
  const saved = localStorage.getItem(PROGRAM_KEY);
  if (saved) return JSON.parse(saved);
  return DEFAULT_PROGRAM;
}

function saveProgram() {
  const get = id => document.getElementById(id)?.value.split('\n').map(s=>s.trim()).filter(Boolean) || [];
  const program = {
    'bryst-skulder-a': get('programBSA'),
    'bryst-skulder-b': get('programBSB'),
    'ryg-arme': get('programRA'),
    'ben-a': get('programBenA'),
    'ben-b': get('programBenB')
  };
  localStorage.setItem(PROGRAM_KEY, JSON.stringify(program));
}

const SPLITS = {
  'bryst-skulder': ['bryst','skulder','chest','peck','incline','dumbell press','dumbbell press','shoulder','lateral','cable lateral','cable cross','crunches','hanging leg','crunch'],
  'ryg-arme': ['ryg','arme','pull','row','lat','bicep','tricep','cable rope','skull','preacher','single arm','pulldown','pullup','overhead tric','rope pull'],
  'ben': ['ben','squat','leg','hamstring','hip','hack','abduction','rdl','calf','seated hamstring','sitting hamstring'],
  'cardio': ['cardio','walk','run','incline walk']
};

function getExerciseSplit(exercise, type) {
  if ((type||'').toLowerCase()==='cardio') return 'cardio';
  const ex=(exercise||'').toLowerCase();
  // Tjek ben FØR ryg-arme for at undgå fejlmatches (fx "hamstring curl" vs "curl")
  const order = ['ben', 'bryst-skulder', 'ryg-arme'];
  for (const split of order) {
    if(SPLITS[split].some(k=>ex.includes(k))) return split;
  }
  return null;
}

// ─── CALORIE CALC ───────────────────────────────────────
function calcBMR(){if(bodySex==='kvinde')return 447.593+(9.247*bodyWeight)+(3.098*bodyHeight)-(4.330*bodyAge);return 88.362+(13.397*bodyWeight)+(4.799*bodyHeight)-(5.677*bodyAge);}
function calcStrengthCals(reps,kg){const cpm=calcBMR()/(24*60);const rel=Math.min(kg/(bodyWeight*0.4),2.0);const met=3.0+rel*3.0;return Math.round(met*cpm*(reps*4/60)*5);}
function calcCardioCals(mins,km,stored){if(stored>0)return stored;const cpm=calcBMR()/(24*60);if(km>0&&mins>0){const spd=km/(mins/60);const met=spd<8?6:spd<10?8:spd<12?10:12;return Math.round(met*cpm*mins);}return Math.round(7*cpm*mins);}

// ─── CSV ────────────────────────────────────────────────
function parseCSV(text){return text.trim().split('\n').map(line=>{const cols=[];let cur='',inQ=false;for(let c of line){if(c==='"')inQ=!inQ;else if(c===','&&!inQ){cols.push(cur.trim().replace(/^"|"$/g,''));cur='';}else cur+=c;}cols.push(cur.trim().replace(/^"|"$/g,''));return cols;});}
function normDate(s){return s?s.split(',')[0].trim():'';}
function groupByDate(rows){const m={},order=[];rows.forEach(r=>{const d=normDate(r[0]);if(!d)return;if(!m[d]){m[d]=[];order.push(d);}m[d].push(r);});return{m,order};}
function buildPRs(rows){const p={};rows.forEach(r=>{if((r[2]||'').toLowerCase()==='cardio')return;const ex=r[1],kg=parseFloat((r[5]||'0').replace(',','.'))||0;if(!p[ex]||kg>p[ex])p[ex]=kg;});return p;}
function prevMaxKg(ex,rows){let max=0;rows.forEach(r=>{if(r[1]===ex){const kg=parseFloat((r[5]||'0').replace(',','.'))||0;if(kg>max)max=kg;}});return max;}

// ─── RENDER SESSION ─────────────────────────────────────
function renderSession(rows,prs,prevRows){
  const byEx={},exOrder=[];
  rows.forEach(r=>{const ex=r[1]||'?';if(!byEx[ex]){byEx[ex]=[];exOrder.push(ex);}byEx[ex].push(r);});
  let html='',totalCals=0;
  exOrder.forEach(ex=>{
    const exRows=byEx[ex],isCardio=(exRows[0][2]||'').toLowerCase()==='cardio';
    if(isCardio){
      const r=exRows[0];
      const mins=parseFloat(r[6])||0,stored=parseFloat(r[7])||0,km=parseFloat(r[8])||0,note=r[9]||'';
      const cals=calcCardioCals(mins,km,stored);totalCals+=cals;
      html+=`<div class="exercise-block">
        <div class="exercise-header"><div class="exercise-name">${ex}</div><div class="exercise-badges"><span style="color:var(--accent2);font-size:11px;font-family:'DM Mono',monospace">~${cals} kcal</span></div></div>
        <div class="cardio-stats">
          <div class="cardio-stat"><div class="cardio-val">${mins||'—'}</div><div class="cardio-label">Min</div></div>
          <div class="cardio-stat"><div class="cardio-val">${km||'—'}</div><div class="cardio-label">Km</div></div>
          <div class="cardio-stat"><div class="cardio-val">~${cals}</div><div class="cardio-label">Kcal</div></div>
        </div>${note?`<div class="cardio-note">📝 ${note}</div>`:''}
      </div>`;
    } else {
      let maxKg=0,sHtml='',setCals=0;
      // Sortér sæt efter sætnummer
      const sortedRows=[...exRows].sort((a,b)=>(parseFloat(a[3])||0)-(parseFloat(b[3])||0));
      sortedRows.forEach((r,i)=>{
        const nr=r[3]||(i+1),reps=parseFloat(r[4])||0,kgRaw=r[5]||'—',note=r[9]||'';
        const kg=parseFloat(kgRaw.replace(',','.'))||0;
        if(kg>maxKg)maxKg=kg;const c=calcStrengthCals(reps,kg);setCals+=c;
        sHtml+=`<div class="set-row"><div class="set-num">Sæt ${nr}</div><div class="set-kg">${kgRaw} kg</div><div class="set-reps">${reps} reps</div>${note?`<div class="set-note">📝 ${note}</div>`:''}</div>`;
      });
      totalCals+=setCals;
      const isPR=prs[ex]&&maxKg>=prs[ex]&&maxKg>0;
      let trend='';
      if(prevRows){const pm=prevMaxKg(ex,prevRows);if(pm>0)trend=maxKg>pm?'<span class="trend-up">↑</span>':maxKg<pm?'<span class="trend-down">↓</span>':'<span class="trend-same">→</span>';}
      html+=`<div class="exercise-block">
        <div class="exercise-header"><div class="exercise-name">${ex}</div><div class="exercise-badges">${trend}${isPR?'<span>🏆</span>':''}<span style="color:var(--muted2);font-size:10px;font-family:'DM Mono',monospace">~${setCals}kcal</span></div></div>
        <div class="sets-grid">${sHtml}</div>
      </div>`;
    }
  });
  return{html,totalCals};
}

// ─── STATS ──────────────────────────────────────────────
function calcStats(m,order){
  const today=new Date();today.setHours(0,0,0,0);
  let streak=0;
  for(let i=order.length-1;i>=0;i--){const d=new Date(order[i]);d.setHours(0,0,0,0);if(Math.round((today-d)/86400000)<=streak+1)streak++;else break;}
  const weekAgo=new Date(today);weekAgo.setDate(weekAgo.getDate()-7);
  let vol=0,cals=0;
  order.forEach(date=>{
    if(new Date(date)>=weekAgo){
      m[date].forEach(r=>{
        const isC=(r[2]||'').toLowerCase()==='cardio';
        if(isC){cals+=calcCardioCals(parseFloat(r[6])||0,parseFloat(r[8])||0,parseFloat(r[7])||0);}
        else{const kg=parseFloat((r[5]||'0').replace(',','.'))||0,reps=parseFloat(r[4])||0;vol+=kg*reps;cals+=calcStrengthCals(reps,kg);}
      });
    }
  });
  return{streak,vol:Math.round(vol/1000),cals};
}

const DUMBBELL_LIST = [];
for (let i = 1; i <= 10; i++) DUMBBELL_LIST.push(i);

const CABLE_LIST = [3.4,4.5,5.6,6.8,7.9,9.1,10.2,11.4,12.5,13.6,14.8,15.9,17.1,18.2,19.4,20.5,21.6,22.7,23.9,25.0,26.1,27.3,28.4,29.5,30.7,31.8,33.0,34.1,35.2,36.4,37.5,38.6,39.8,40.9,42.0,43.2,44.3,45.5,46.6,47.7,48.9,50.0];

function buildBarbellList(barWeight) {
  const plates = [1.25,2.5,5,10,15,20,25];
  const validWeights = new Set([barWeight]);
  function addPlates(current, idx) {
    if (idx >= plates.length) return;
    const next = Math.round((current + plates[idx]*2)*100)/100;
    if (next <= 220) { validWeights.add(next); addPlates(next, idx); addPlates(next, idx+1); }
    addPlates(current, idx+1);
  }
  addPlates(barWeight, 0);
  return [...validWeights].sort((a,b)=>a-b);
}

const MACHINE_LIST = [];
for (let i = 5; i <= 200; i += 5) MACHINE_LIST.push(i);

const WEIGHT_INCREMENTS = {
  dumbbell: DUMBBELL_LIST,
  cable: CABLE_LIST,
  barbell: buildBarbellList(20),
  machine: MACHINE_LIST
};

function detectEquipType(name) {
  const n = name.toLowerCase();
  if (n.includes('dumbbell') || n.includes('dumbell')) return 'dumbbell';
  if (n.includes('cable') || n.includes('peck fly')) return 'cable';
  if (n.includes('smith') || n.includes('barbell')) return 'barbell';
  return 'machine';
}

function getNextWeight(currentKg, direction, equipType) {
  const list = WEIGHT_INCREMENTS[equipType] || WEIGHT_INCREMENTS.machine;
  let idx = list.reduce((best,w,i) => Math.abs(w-currentKg) < Math.abs(list[best]-currentKg) ? i : best, 0);
  if (direction === 'up') return list[Math.min(idx+1, list.length-1)];
  if (direction === 'down') return list[Math.max(idx-1, 0)];
  return list[idx];
}

// ─── SPLIT ROTATION ──────────────────────────────────────
const SPLIT_ORDER = ['bryst-skulder','ryg-arme','ben'];
const splitNames = {'bryst-skulder':'Bryst/Skulder','ryg-arme':'Ryg/Arme','ben':'Ben'};

function detectSessionSplit(rows) {
  const counts = {};
  rows.forEach(r => { const s=getExerciseSplit(r[1],r[2]); if(s&&s!=='cardio') counts[s]=(counts[s]||0)+1; });
  return Object.entries(counts).sort((a,b)=>b[1]-a[1])[0]?.[0]||null;
}

function getNextSplit(current) {
  const idx = SPLIT_ORDER.indexOf(current);
  return idx===-1 ? null : SPLIT_ORDER[(idx+1)%SPLIT_ORDER.length];
}

// ─── AI DEBRIEF ──────────────────────────────────────────
async function callGemini(todayRows, allRows) {
  const apiKey = localStorage.getItem(GEMINI_KEY);
  if (!apiKey) { alert('Tilføj din Groq API nøgle i ⚙️ indstillinger'); return; }

  const btn = document.getElementById('doneBtn');
  btn.innerHTML = '<div class="spinner"></div> Analyserer...';
  btn.classList.add('loading');
  btn.disabled = true;

  // Byg historik for dagens session
  const øvelseHistorik = {};
  todayRows.forEach(r => {
    const ex = r[1];
    if (!øvelseHistorik[ex]) øvelseHistorik[ex] = { idag: [], historik: [] };
    øvelseHistorik[ex].idag.push({ sæt: r[3], reps: r[4], kg: r[5], note: r[9]||'' });
  });
  allRows.forEach(r => {
    const ex = r[1], dato = normDate(r[0]), idagDato = normDate(todayRows[0]?.[0]||'');
    if (øvelseHistorik[ex] && dato !== idagDato)
      øvelseHistorik[ex].historik.push({ dato, sæt: r[3], reps: r[4], kg: r[5] });
  });

  const todaySplit = detectSessionSplit(todayRows);

  // ── JavaScript beregner direction deterministisk ─────────
  // AI bruges KUN til debrief-tekst — ikke til vægtbeslutninger
  const COMPOUND = ['incline smith press','incline dumbell press','dumbell press incline','chest press maskine','hacksquat','leg press','assisted pullups','plate loaded rows','lat pulldown','shoulder dumbell press','rdl'];

  // Detect A or B variant based on exercises in today's rows
  function detectABVariant(rows, splitBase) {
    if (splitBase === 'bryst-skulder') {
      const hasSmith = rows.some(r => r[1].toLowerCase().includes('smith'));
      const hasDumbell = rows.some(r => r[1].toLowerCase().includes('dumbell') || r[1].toLowerCase().includes('dumbbell'));
      if (hasSmith) return 'a';
      if (hasDumbell) return 'b';
    }
    if (splitBase === 'ben') {
      const hasRDL = rows.some(r => r[1].toLowerCase().includes('rdl'));
      const hasHack = rows.some(r => r[1].toLowerCase().includes('hack'));
      if (hasRDL) return 'b';
      if (hasHack) return 'a';
    }
    return getLastAB(splitBase) || 'a';
  }

  const splitBase = todaySplit === 'bryst-skulder' || todaySplit === 'ben' ? todaySplit : null;
  const todayVariant = splitBase ? detectABVariant(todayRows, splitBase) : null;
  const fullSplitKey = splitBase ? `${splitBase}-${todayVariant}` : todaySplit;

  // Save which variant was done today
  if (splitBase && todayVariant) setLastAB(splitBase, todayVariant);

  // Next variant for same split
  const nextVariant = splitBase ? (todayVariant === 'a' ? 'b' : 'a') : null;
  const nextSplitKey = splitBase ? `${splitBase}-${nextVariant}` : todaySplit;

  function calcDirection(ex, data) {
    const isCompound = COMPOUND.some(c => ex.toLowerCase().includes(c) || c.includes(ex.toLowerCase()));
    const sessions = data?.idag || [];
    if (!sessions.length) return 'none'; // ikke trænet i dag

    const reps = sessions.map(s => parseFloat(s.reps)||0);
    const upperGoal = isCompound ? 8 : 20;
    const lowerGoal = isCompound ? 4 : 10;
    const allHitUpper = reps.every(r => r >= upperGoal);
    const mostBelowLower = reps.filter(r => r < lowerGoal).length > reps.length / 2;

    if (allHitUpper) return 'up';
    if (mostBelowLower) return 'down';
    return 'same';
  }

  function getRepGoal(ex) {
    const isCompound = COMPOUND.some(c => ex.toLowerCase().includes(c) || c.includes(ex.toLowerCase()));
    return isCompound ? '4-8 reps' : '10-20 reps';
  }

  // Byg exercises deterministisk fra JavaScript — brug NÆSTE variant's program
  const splitProgram = (getProgram()[nextSplitKey] || getProgram()[todaySplit] || DEFAULT_PROGRAM[nextSplitKey] || DEFAULT_PROGRAM[todaySplit] || []);

  // Find seneste kendte vægt for en øvelse fra ALLE historik (ikke kun dagens session)
  function getLastKnownKg(exName) {
    // Søg i alle rows for seneste kg for denne øvelse
    const matches = allRows.filter(r => r[1]?.toLowerCase() === exName.toLowerCase() && r[2]?.toLowerCase() !== 'cardio');
    if (!matches.length) return 0;
    // Sortér baglæns (nyeste dato øverst) og tag første kg-værdi
    const sorted = [...matches].sort((a,b) => new Date(normDate(b[0])) - new Date(normDate(a[0])));
    return parseFloat((sorted[0][5]||'0').replace(',','.'))||0;
  }

  const jsExercises = splitProgram.map(exName => {
    const dataKey = Object.keys(øvelseHistorik).find(k => k.toLowerCase() === exName.toLowerCase());
    const data = dataKey ? øvelseHistorik[dataKey] : null;
    const direction = calcDirection(exName, data);
    // Brug dagens vægt hvis trænet, ellers hent seneste historiske vægt
    const todayKg = data?.idag?.length ? parseFloat(data.idag[0].kg)||0 : 0;
    const lastKg = todayKg > 0 ? todayKg : getLastKnownKg(exName);
    const equipType = detectEquipType(exName);
    const nextKg = lastKg === 0 ? 0 : getNextWeight(lastKg, direction === 'none' ? 'same' : direction, equipType);
    const diff = nextKg > 0 ? Math.round((nextKg - lastKg)*10)/10 : 0;
    const repGoal = getRepGoal(exName);

    let reason = '';
    if (direction === 'none' && lastKg > 0) reason = 'Ikke trænet i dag — behold sidst kendte vægt';
    else if (direction === 'none') reason = 'Ingen historik — start let og find din vægt';
    else if (direction === 'up') reason = 'Alle sæt nåede målet — gå op i vægt';
    else if (direction === 'down') reason = 'Flest sæt under minimumsmålet — sænk vægten';
    else reason = 'Inden for målzonen — hold vægten';

    return { name: exName, currentKg: lastKg, nextKg, diff, direction: direction === 'none' ? 'same' : direction, reason, repGoal, notTrained: direction === 'none' && todayKg === 0 };
  });

  const prompt = `Du er en personlig træner. Skriv en kort debrief på dansk om dagens præstation.

DAGENS SPLIT: ${splitNames[todaySplit]||'Ukendt'}
DAGENS TRÆNING:
${JSON.stringify(øvelseHistorik, null, 2)}

Skriv 2-3 præcise sætninger om hvad der gik godt og hvad der skal forbedres. Nævn specifikke øvelser og reps. Vær direkte og konkret. Svar KUN med en JSON med ét felt:
{"debrief": "din tekst her"}`;

  try {
    const res = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{ role: 'user', content: prompt }],
        temperature: 0.2,
        max_tokens: 300
      })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    let text = data.choices[0].message.content.trim();
    text = text.replace(/^```json\s*/i,'').replace(/^```\s*/i,'').replace(/```$/i,'').trim();

    let parsed;
    try { parsed = JSON.parse(text); } catch(e) { throw new Error('AI svarede ikke i JSON format. Prøv igen.'); }

    localStorage.setItem(DEBRIEF_KEY + '_' + todaySplit, JSON.stringify({ dato: normDate(todayRows[0]?.[0]||''), text: parsed.debrief||'', split: todaySplit, variant: todayVariant }));
    const nextLabel = splitBase ? `${splitNames[todaySplit]||todaySplit} ${nextVariant?.toUpperCase()}` : (splitNames[todaySplit]||todaySplit);
    localStorage.setItem(NEXT_KEY + '_' + todaySplit, JSON.stringify({ dato: normDate(todayRows[0]?.[0]||''), exercises: jsExercises, splitName: nextLabel, splitKey: todaySplit, nextVariant }));

    renderDebriefSection();
    btn.innerHTML = '✅ Analyse gemt';
    setTimeout(() => {
      btn.innerHTML = '🏁 Træning Færdig — Få Debrief';
      btn.classList.remove('loading');
      btn.disabled = false;
    }, 2000);
  } catch(err) {
    btn.innerHTML = '🏁 Træning Færdig — Få Debrief';
    btn.classList.remove('loading');
    btn.disabled = false;
    alert('Fejl: ' + err.message);
  }
}

function clearDebrief() {
  // Ryd alle splits
  ['bryst-skulder','ryg-arme','ben','cardio'].forEach(s => {
    localStorage.removeItem(DEBRIEF_KEY + '_' + s);
    localStorage.removeItem(NEXT_KEY + '_' + s);
  });
  // Ryd også gamle enkelt-keys
  localStorage.removeItem(DEBRIEF_KEY);
  localStorage.removeItem(NEXT_KEY);
  // Ryd alt der starter med traening_
  Object.keys(localStorage).filter(k => k.startsWith('traening_debrief') || k.startsWith('traening_next')).forEach(k => localStorage.removeItem(k));
  renderDebriefSection();
  closeSettings();
}

function renderDebriefSection() {
  let html = '';

  if (currentTab === 'overview') {
    // På oversigt — vis næste træning for ALLE splits der har data
    ['bryst-skulder','ryg-arme','ben'].forEach(split => {
      const nextData = localStorage.getItem(NEXT_KEY + '_' + split);
      const debriefData = localStorage.getItem(DEBRIEF_KEY + '_' + split);
      if (debriefData) {
        const d = JSON.parse(debriefData);
        html += `<div class="debrief-card fade-in">
          <div class="debrief-header">
            <div>
              <div class="debrief-title">📊 Debrief — ${splitNames[split]||split}</div>
              <div class="debrief-subtitle">${d.dato}</div>
            </div>
          </div>
          <div class="debrief-body">${d.text}</div>
          <div class="debrief-powered">Powered by Groq AI (llama-3.3-70b · gratis)</div>
        </div>`;
      }
      if (nextData) {
        const n = JSON.parse(nextData);
        html += renderNextCard(n);
      }
    });
  } else {
    // På en specifik split-tab — vis debrief for DENNE split og næste plan for NÆSTE split
    const debriefData = localStorage.getItem(DEBRIEF_KEY + '_' + currentTab);
    if (debriefData) {
      const d = JSON.parse(debriefData);
      html += `<div class="debrief-card fade-in">
        <div class="debrief-header">
          <div>
            <div class="debrief-title">📊 Debrief</div>
            <div class="debrief-subtitle">${d.dato}</div>
          </div>
        </div>
        <div class="debrief-body">${d.text}</div>
        <div class="debrief-powered">Powered by Groq AI (llama-3.3-70b · gratis)</div>
      </div>`;
    }

    // Næste plan for DENNE tab (gemt under denne tabs key)
    const nextData = localStorage.getItem(NEXT_KEY + '_' + currentTab);
    if (nextData) {
      const n = JSON.parse(nextData);
      html += renderNextCard(n);
    }
  }

  document.getElementById('debriefSection').innerHTML = html;
}

function renderNextCard(n) {
  const deload = isDeloadActive();
  let bodyHtml = '';
  if (n.exercises) {
    bodyHtml = n.exercises.map(ex => {
      const badgeClass = ex.diff > 0 ? 'up' : ex.diff < 0 ? 'down' : 'same';
      const arrow = ex.diff > 0 ? '↑' : ex.diff < 0 ? '↓' : '→';
      const changeText = ex.diff > 0 ? `+${ex.diff} kg` : ex.diff < 0 ? `${ex.diff} kg` : 'samme';
      const noData = ex.notTrained || ex.currentKg === 0;
      const displayKg = deload && ex.nextKg > 0 ? Math.round(ex.nextKg * 0.5 * 2) / 2 : ex.nextKg;

      let setsHtml = '';
      if (noData) {
        setsHtml = `<div style="font-size:11px;color:var(--muted2);padding:4px 0">Ikke trænet i dag — behold sidst kendte vægt</div>`;
      } else {
        const repGoal = ex.repGoal || '6-12 reps';
        setsHtml = `
          <div class="set-plan-row"><span class="set-plan-num">Sæt 1</span><span class="set-plan-kg">${displayKg} kg</span><span class="set-plan-reps">${repGoal}</span></div>
          <div class="set-plan-row"><span class="set-plan-num">Sæt 2</span><span class="set-plan-kg">${displayKg} kg</span><span class="set-plan-reps">${repGoal}</span></div>
          <div class="set-plan-row"><span class="set-plan-num">Sæt 3</span><span class="set-plan-kg">${displayKg} kg</span><span class="set-plan-reps">${repGoal}</span></div>`;
      }

      return `<div class="next-exercise-block">
        <div class="next-exercise-name">
          ${ex.name}
          ${!noData ? `<span class="next-badge ${deload ? 'down' : badgeClass}" style="font-size:10px;margin-left:8px">${deload ? '🟠 50%' : arrow + ' ' + changeText}</span>` : ''}
        </div>
        <div class="set-plan-grid">${setsHtml}</div>
        <div class="next-reason">${deload ? 'DELOAD: 50% af normal vægt' : ex.reason}</div>
      </div>`;
    }).join('');
  } else {
    bodyHtml = `<div style="white-space:pre-wrap;font-size:13px;color:#a0c0d0;line-height:1.7">${n.text||''}</div>`;
  }
  return `<div class="next-card fade-in">
    <div class="next-header">
      <div class="next-title">${deload ? '🟠 DELOAD — ' : '🎯 Næste træning — '}${n.splitName||''}</div>
      <div class="next-subtitle">${deload ? '50% vægt · restitution' : 'Deterministisk beregnet'}</div>
    </div>
    <div class="next-body">${bodyHtml}</div>
  </div>`;
}

// ─── OVERVIEW ───────────────────────────────────────────
function renderOverview(rows) {
  const {m,order}=groupByDate(rows);
  const prs=buildPRs(rows);
  const dates=[...order].reverse();
  const ld=dates[0],lr=m[ld],pd=dates[1],pr2=pd?m[pd]:null;
  const exCnt=new Set(lr.map(r=>r[1])).size;
  const{html:lHtml,totalCals:lCals}=renderSession(lr,prs,pr2);

  // Done button
  const latestDate = dates[0];
  const doneBtn = `<button class="done-btn" id="doneBtn" onclick="callGemini(globalData.filter(r=>normDate(r[0])==='${latestDate}'), globalData)">🏁 Træning Færdig — Få Debrief</button>`;

  let html=`<div class="section fade-in">
    <div class="section-label">Seneste træning</div>
    <div class="latest-card">
      <div class="latest-header">
        <div><div class="latest-date">${ld}</div><div class="latest-meta">${exCnt} øvelser · ${lr.length} sets</div></div>
        <div class="cals-badge">🔥 ~${lCals} kcal</div>
      </div>${lHtml}
      <div class="est-note">~ = estimeret · ikke præcist</div>
      ${doneBtn}
    </div>
  </div>`;

  if(dates.length>1){
    html+=`<div class="section"><div class="section-label">Tidligere træninger</div>`;
    dates.slice(1).forEach((date,i)=>{
      const sr=m[date],ec=new Set(sr.map(r=>r[1])).size;
      const{html:sHtml,totalCals:sCals}=renderSession(sr,prs,null);
      html+=`<div class="history-item" id="h${i}">
        <div class="history-header" onclick="this.parentElement.classList.toggle('open')">
          <div><div class="history-date">${date}</div><div class="history-info">${ec} øvelser · ${sr.length} sets · ~${sCals} kcal</div></div>
          <span class="chevron">▾</span>
        </div>
        <div class="history-body">${sHtml}</div>
      </div>`;
    });
    html+=`</div>`;
  }
  return html;
}

// ─── SPLIT VIEW ─────────────────────────────────────────
function renderSplitView(splitKey, rows) {
  const prs=buildPRs(rows);
  const{m,order}=groupByDate(rows);
  const dates=[...order].reverse();
  const splitNames={'bryst-skulder':'Bryst/Skulder','ryg-arme':'Ryg/Arme','ben':'Ben','cardio':'Cardio'};

  const splitDates=dates.filter(date=>m[date].some(r=>{
    if(splitKey==='cardio') return (r[2]||'').toLowerCase()==='cardio';
    return getExerciseSplit(r[1],r[2])===splitKey;
  }));

  if(!splitDates.length) return `<div class="section"><div class="empty-split">Ingen træninger logget for ${splitNames[splitKey]} endnu 💪</div></div>`;

  let html='';
  splitDates.forEach((date,i)=>{
    const splitRows=m[date].filter(r=>splitKey==='cardio'?(r[2]||'').toLowerCase()==='cardio':getExerciseSplit(r[1],r[2])===splitKey);
    if(!splitRows.length) return;
    const prevDate=splitDates[i+1];
    const prevRows=prevDate?m[prevDate].filter(r=>getExerciseSplit(r[1],r[2])===splitKey):null;
    const{html:sHtml,totalCals}=renderSession(splitRows,prs,prevRows);
    const exCnt=new Set(splitRows.map(r=>r[1])).size;

    if(i===0){
      const doneBtn = splitKey !== 'cardio' ? `<button class="done-btn" id="doneBtn" onclick="callGemini(globalData.filter(r=>normDate(r[0])==='${date}'), globalData)">🏁 Træning Færdig — Få Debrief</button>` : '';
      html+=`<div class="section fade-in">
        <div class="section-label">Seneste ${splitNames[splitKey]}</div>
        <div class="latest-card">
          <div class="latest-header">
            <div><div class="latest-date">${date}</div><div class="latest-meta">${exCnt} øvelser · ${splitRows.length} sets</div></div>
            <div class="cals-badge">🔥 ~${totalCals} kcal</div>
          </div>${sHtml}
          <div class="est-note">~ = estimeret · ikke præcist</div>
          ${doneBtn}
        </div>
      </div>`;
    } else {
      if(i===1) html+=`<div class="section"><div class="section-label">Tidligere</div>`;
      html+=`<div class="history-item" id="s${i}">
        <div class="history-header" onclick="this.parentElement.classList.toggle('open')">
          <div><div class="history-date">${date}</div><div class="history-info">${exCnt} øvelser · ${splitRows.length} sets · ~${totalCals} kcal</div></div>
          <span class="chevron">▾</span>
        </div>
        <div class="history-body">${sHtml}</div>
      </div>`;
    }
  });
  if(splitDates.length>1) html+=`</div>`;
  return html;
}

// ─── TABS ───────────────────────────────────────────────
function renderPRs(rows) {
  // Byg PR data — bedste kg per øvelse med dato og reps
  const prMap = {}; // { exName: { kg, reps, dato } }
  rows.forEach(r => {
    const ex = r[1];
    if (!ex || (r[2]||'').toLowerCase() === 'cardio') return;
    const kg = parseFloat((r[5]||'0').replace(',','.'))||0;
    const reps = parseFloat(r[4])||0;
    const dato = normDate(r[0]);
    if (!prMap[ex] || kg > prMap[ex].kg || (kg === prMap[ex].kg && reps > prMap[ex].reps)) {
      prMap[ex] = { kg, reps, dato };
    }
  });

  if (!Object.keys(prMap).length) return `<div class="section"><div class="empty-split">Ingen PR's registreret endnu 💪</div></div>`;

  // Gruppér per split
  const groups = { 'Bryst/Skulder': [], 'Ryg/Arme': [], 'Ben': [], 'Andet': [] };
  const splitNameMap = { 'bryst-skulder': 'Bryst/Skulder', 'ryg-arme': 'Ryg/Arme', 'ben': 'Ben' };
  Object.entries(prMap).forEach(([ex, data]) => {
    const split = getExerciseSplit(ex, 'styrke');
    const groupName = splitNameMap[split] || 'Andet';
    groups[groupName].push({ ex, ...data });
  });

  let html = '';
  Object.entries(groups).forEach(([groupName, prs]) => {
    if (!prs.length) return;
    prs.sort((a,b) => b.kg - a.kg);
    html += `<div class="section fade-in">
      <div class="section-label">${groupName}</div>
      <div class="pr-card">`;
    prs.forEach(p => {
      html += `<div class="pr-row">
        <div>
          <div class="pr-name">🏆 ${p.ex}</div>
          <div class="pr-date">${p.dato}</div>
        </div>
        <div class="pr-right">
          <div class="pr-kg">${p.kg} kg</div>
          <div class="pr-reps">${p.reps} reps</div>
        </div>
      </div>`;
    });
    html += `</div></div>`;
  });
  return html;
}

function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>{if(t.getAttribute('onclick').includes(`'${tab}'`))t.classList.add('active');});
  if (tab === 'prs') {
    document.getElementById('mainContent').innerHTML = renderPRs(globalData);
    document.getElementById('debriefSection').innerHTML = '';
  } else {
    document.getElementById('mainContent').innerHTML = tab==='overview' ? renderOverview(globalData) : renderSplitView(tab,globalData);
    renderDebriefSection();
  }
}

// ─── RENDER DASHBOARD ───────────────────────────────────
function renderDashboard(rows){
  if(!rows.length){document.getElementById('mainContent').innerHTML='<div class="state-msg">Ingen træninger endnu 💪</div>';return;}
  globalData=rows;
  const{m,order}=groupByDate(rows);
  const{streak,vol,cals}=calcStats(m,order);
  document.getElementById('deloadBar').style.display='block';
  renderDeloadBar();
  document.getElementById('tabs').style.display='flex';
  document.getElementById('mainContent').innerHTML=renderOverview(rows);
  renderDebriefSection();
}

// ─── DATA ───────────────────────────────────────────────
function loadData(url){
  document.getElementById('mainContent').innerHTML='<div class="state-msg">Henter data...</div>';
  document.getElementById('deloadBar').style.display='none';
  document.getElementById('tabs').style.display='none';
  fetch(url+'&t='+Date.now())
    .then(r=>r.text())
    .then(csv=>{
      const rows=parseCSV(csv);
      if(rows.length<2){document.getElementById('mainContent').innerHTML='<div class="state-msg">Ingen data endnu 💪</div>';return;}
      renderDashboard(rows.slice(1).filter(r=>r[0]));
    })
    .catch(e=>{document.getElementById('mainContent').innerHTML=`<div class="error-card">Kunne ikke hente data.<br><span style="color:var(--muted2);font-size:11px">${e.message}</span></div>`;});
}
function refreshData(){const u=localStorage.getItem(SHEET_KEY);if(u)loadData(u);}

function openSettings(){
  document.getElementById('sheetUrl').value=localStorage.getItem(SHEET_KEY)||'';
  document.getElementById('geminiKey').value=localStorage.getItem(GEMINI_KEY)||'';
  document.getElementById('bodyWeight').value=localStorage.getItem(WEIGHT_KEY)||'';
  document.getElementById('bodyHeight').value=localStorage.getItem(HEIGHT_KEY)||'';
  document.getElementById('bodyAge').value=localStorage.getItem(AGE_KEY)||'';
  document.getElementById('bodySex').value=localStorage.getItem(SEX_KEY)||'mand';
  const prog = getProgram();
  const set = (id, key) => { const el = document.getElementById(id); if(el) el.value = (prog[key]||DEFAULT_PROGRAM[key]||[]).join('\n'); };
  set('programBSA','bryst-skulder-a');
  set('programBSB','bryst-skulder-b');
  set('programRA','ryg-arme');
  set('programBenA','ben-a');
  set('programBenB','ben-b');
  document.getElementById('settingsPanel').classList.add('open');
}
function closeSettings(){document.getElementById('settingsPanel').classList.remove('open');}
function saveSettings(){
  const url=document.getElementById('sheetUrl').value.trim();
  const gk=document.getElementById('geminiKey').value.trim();
  const w=document.getElementById('bodyWeight').value.trim(),h=document.getElementById('bodyHeight').value.trim();
  const a=document.getElementById('bodyAge').value.trim(),s=document.getElementById('bodySex').value.trim().toLowerCase();
  if(gk) localStorage.setItem(GEMINI_KEY,gk);
  if(w){bodyWeight=parseFloat(w);localStorage.setItem(WEIGHT_KEY,w);}
  if(h){bodyHeight=parseFloat(h);localStorage.setItem(HEIGHT_KEY,h);}
  if(a){bodyAge=parseFloat(a);localStorage.setItem(AGE_KEY,a);}
  if(s){bodySex=s;localStorage.setItem(SEX_KEY,s);}
  saveProgram();
  if(url){localStorage.setItem(SHEET_KEY,url);loadData(url);}
  closeSettings();
}

window.onload=()=>{
  bodyWeight=parseFloat(localStorage.getItem(WEIGHT_KEY)||'95');
  bodyHeight=parseFloat(localStorage.getItem(HEIGHT_KEY)||'180');
  bodyAge=parseFloat(localStorage.getItem(AGE_KEY)||'22');
  bodySex=localStorage.getItem(SEX_KEY)||'mand';
  const url=localStorage.getItem(SHEET_KEY);
  if(url)loadData(url);
  else document.getElementById('mainContent').innerHTML='<div class="state-msg">Tryk ⚙️ og indsæt dit Google Sheets link</div>';
};
