<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Træningsdashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0f0f0f;
    color: #f0f0f0;
    min-height: 100vh;
    padding: 24px 16px 48px;
  }

  h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 4px;
  }

  .subtitle {
    font-size: 13px;
    color: #666;
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #555;
    margin-bottom: 12px;
  }

  /* Latest session */
  .latest-card {
    background: #1a1a1a;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 32px;
    border: 1px solid #2a2a2a;
  }

  .latest-date {
    font-size: 13px;
    color: #888;
    margin-bottom: 16px;
    font-weight: 500;
  }

  .exercise-block {
    margin-bottom: 18px;
  }

  .exercise-block:last-child { margin-bottom: 0; }

  .exercise-name {
    font-size: 15px;
    font-weight: 600;
    color: #fff;
    margin-bottom: 8px;
  }

  .sets-row {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .set-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #222;
    border-radius: 8px;
    padding: 8px 12px;
  }

  .set-label {
    font-size: 12px;
    color: #666;
    font-weight: 500;
    min-width: 48px;
  }

  .set-kg {
    font-size: 14px;
    font-weight: 600;
    color: #c8f080;
  }

  .set-reps {
    font-size: 13px;
    color: #aaa;
  }

  .divider {
    height: 1px;
    background: #222;
    margin: 14px 0;
  }

  /* History */
  .history-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .history-item {
    background: #1a1a1a;
    border-radius: 12px;
    border: 1px solid #2a2a2a;
    overflow: hidden;
  }

  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .history-header:active { background: #222; }

  .history-date {
    font-size: 14px;
    font-weight: 600;
  }

  .history-meta {
    font-size: 12px;
    color: #555;
    margin-top: 2px;
  }

  .chevron {
    font-size: 12px;
    color: #444;
    transition: transform 0.2s;
  }

  .history-item.open .chevron { transform: rotate(180deg); }

  .history-body {
    display: none;
    padding: 0 16px 16px;
  }

  .history-item.open .history-body { display: block; }

  .loading {
    text-align: center;
    color: #444;
    font-size: 14px;
    padding: 40px 0;
  }

  .error-msg {
    background: #2a1a1a;
    border: 1px solid #5a2020;
    border-radius: 12px;
    padding: 16px;
    font-size: 13px;
    color: #ff6b6b;
    line-height: 1.5;
  }

  .config-box {
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 28px;
  }

  .config-box label {
    display: block;
    font-size: 12px;
    color: #666;
    margin-bottom: 8px;
    font-weight: 500;
  }

  .config-box input {
    width: 100%;
    background: #111;
    border: 1px solid #333;
    border-radius: 8px;
    padding: 10px 12px;
    color: #f0f0f0;
    font-size: 13px;
    font-family: monospace;
    margin-bottom: 12px;
  }

  .config-box input:focus { outline: none; border-color: #c8f080; }

  .btn {
    background: #c8f080;
    color: #0f0f0f;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
  }

  .btn:active { opacity: 0.8; }

  .empty {
    color: #444;
    font-size: 13px;
    text-align: center;
    padding: 20px 0;
  }
</style>
</head>
<body>

<h1>💪 Træningsdashboard</h1>
<p class="subtitle">Dine seneste sets — automatisk fra Sheets</p>

<div class="config-box" id="configBox">
  <label>Indsæt dit Google Sheets CSV-link:</label>
  <input type="text" id="sheetUrl" placeholder="https://docs.google.com/spreadsheets/d/.../export?format=csv" />
  <button class="btn" onclick="saveAndLoad()">Hent data</button>
  <p style="font-size:11px;color:#444;margin-top:10px;">Linket gemmes lokalt på din telefon</p>
</div>

<div id="dashboard" style="display:none">
  <p class="section-label">Seneste træning</p>
  <div class="latest-card" id="latestCard"></div>

  <p class="section-label">Tidligere træninger</p>
  <div class="history-list" id="historyList"></div>
</div>

<div class="loading" id="loadingMsg" style="display:none">Henter data...</div>
<div id="errorBox" style="display:none"></div>

<script>
  const STORAGE_KEY = 'traening_sheet_url';

  function saveAndLoad() {
    const url = document.getElementById('sheetUrl').value.trim();
    if (!url) return;
    localStorage.setItem(STORAGE_KEY, url);
    loadData(url);
  }

  function loadData(url) {
    document.getElementById('configBox').style.display = 'none';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('loadingMsg').style.display = 'block';
    document.getElementById('errorBox').style.display = 'none';

    fetch(url)
      .then(r => r.text())
      .then(csv => {
        document.getElementById('loadingMsg').style.display = 'none';
        const rows = parseCSV(csv);
        if (rows.length < 2) {
          showError('Ingen data fundet i Sheetet endnu.');
          return;
        }
        renderDashboard(rows.slice(1)); // skip header
      })
      .catch(err => {
        document.getElementById('loadingMsg').style.display = 'none';
        showError('Kunne ikke hente data. Tjek at linket er korrekt og at Sheetet er offentligt (Fil → Del → Alle med linket kan se).\n\n' + err.message);
        document.getElementById('configBox').style.display = 'block';
      });
  }

  function parseCSV(text) {
    return text.trim().split('\n').map(line => {
      const cols = [];
      let cur = '', inQ = false;
      for (let i = 0; i < line.length; i++) {
        const c = line[i];
        if (c === '"') { inQ = !inQ; }
        else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else { cur += c; }
      }
      cols.push(cur.trim());
      return cols;
    });
  }

  function parseDate(str) {
    // Extract just the date part (ignore time)
    const match = str.match(/(\d{1,2})[.\-\/](\s*\w+)[.\-\/\s,]*(\d{4})/);
    if (!match) return str.split(',')[0].split(' ').slice(0, 3).join(' ');
    return str.split(',')[0].trim();
  }

  function groupByDate(rows) {
    const byDate = {};
    rows.forEach(row => {
      const rawDate = row[0] || '';
      // Normalize: take only date part before comma or time
      const date = rawDate.split(',')[0].trim();
      if (!date) return;
      if (!byDate[date]) byDate[date] = [];
      byDate[date].push(row);
    });
    return byDate;
  }

  function renderSession(rows) {
    const byExercise = {};
    rows.forEach(row => {
      const exercise = row[1] || 'Ukendt';
      if (!byExercise[exercise]) byExercise[exercise] = [];
      byExercise[exercise].push(row);
    });

    let html = '';
    const exercises = Object.keys(byExercise);
    exercises.forEach((ex, i) => {
      html += `<div class="exercise-block">`;
      html += `<div class="exercise-name">${ex}</div>`;
      html += `<div class="sets-row">`;
      byExercise[ex].forEach((row, idx) => {
        const sæt = row[2] || (idx + 1);
        const reps = row[3] || '—';
        const kg = row[4] || '—';
        html += `
          <div class="set-item">
            <span class="set-label">Sæt ${sæt}</span>
            <span class="set-kg">${kg} kg</span>
            <span class="set-reps">${reps} reps</span>
          </div>`;
      });
      html += `</div></div>`;
      if (i < exercises.length - 1) html += `<div class="divider"></div>`;
    });
    return html;
  }

  function renderDashboard(rows) {
    const byDate = groupByDate(rows);
    const dates = Object.keys(byDate).reverse(); // newest first

    if (dates.length === 0) {
      showError('Ingen træninger logget endnu.');
      return;
    }

    // Latest
    const latestDate = dates[0];
    const latestRows = byDate[latestDate];
    const latestExCount = new Set(latestRows.map(r => r[1])).size;

    document.getElementById('latestCard').innerHTML = `
      <div class="latest-date">${latestDate} · ${latestExCount} øvelse${latestExCount !== 1 ? 'r' : ''}</div>
      ${renderSession(latestRows)}
    `;

    // History
    const historyDates = dates.slice(1);
    const historyList = document.getElementById('historyList');

    if (historyDates.length === 0) {
      historyList.innerHTML = '<p class="empty">Ingen tidligere træninger endnu</p>';
    } else {
      historyList.innerHTML = historyDates.map((date, i) => {
        const sessionRows = byDate[date];
        const exCount = new Set(sessionRows.map(r => r[1])).size;
        const setCount = sessionRows.length;
        return `
          <div class="history-item" id="hist-${i}">
            <div class="history-header" onclick="toggleHistory('hist-${i}')">
              <div>
                <div class="history-date">${date}</div>
                <div class="history-meta">${exCount} øvelser · ${setCount} sets</div>
              </div>
              <span class="chevron">▼</span>
            </div>
            <div class="history-body">
              ${renderSession(sessionRows)}
            </div>
          </div>`;
      }).join('');
    }

    document.getElementById('dashboard').style.display = 'block';
  }

  function toggleHistory(id) {
    const el = document.getElementById(id);
    el.classList.toggle('open');
  }

  function showError(msg) {
    const box = document.getElementById('errorBox');
    box.style.display = 'block';
    box.innerHTML = `<div class="error-msg">${msg}</div>`;
  }

  // Auto-load if URL saved
  window.onload = () => {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      document.getElementById('sheetUrl').value = saved;
      loadData(saved);
    }
  };
</script>
</body>
</html>
